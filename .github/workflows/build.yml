name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Cache OpenCV Build
        id: cache-opencv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: 3rdparty/opencv
          key: opencv-minimal-4.8.0-${{ matrix.arch }}-${{ hashFiles('scripts/build_opencv_minimal.sh') }}
          restore-keys: |
            opencv-minimal-4.8.0-${{ matrix.arch }}-

      - name: Prepare Build Directories
        run: |
          # Fix permissions for Docker container
          chmod -R 777 .

      - name: Download Dependencies
        run: |
          # Download ML Models (checksum-verified)
          bash scripts/download_models_for_build.sh

      - name: Build OpenCV Minimal
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v $(pwd):/home/mersdk/src:z \
            coderus/sailfishos-platform-sdk:5.0.0.43 \
            bash -c "cd /home/mersdk/src && sb2 -t SailfishOS-5.0.0.43-${{ matrix.arch }} bash scripts/build_opencv_minimal.sh"

          echo "✓ OpenCV minimal build complete"
          ls -lh 3rdparty/opencv/lib/

      - name: Verify OpenCV Cache
        if: steps.cache-opencv.outputs.cache-hit == 'true'
        run: |
          echo "✓ Using cached OpenCV build"
          ls -lh 3rdparty/opencv/lib/

      - name: Build for ${{ matrix.arch }}
        run: |

          docker run --rm \
            -v $(pwd):/home/mersdk/src:z \
            coderus/sailfishos-platform-sdk:5.0.0.43 \
            bash -c "cd /home/mersdk/src && mb2 -t SailfishOS-5.0.0.43-${{ matrix.arch }} build"

      - name: Upload RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: harbour-nami-${{ matrix.arch }}
          path: RPMS/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1

      - name: List downloaded files
        run: ls -lR

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          # download-artifact v8 no longer nests single artifacts in a
          # per-artifact directory; match RPMs wherever they land
          files: |
            **/*.rpm
            *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
